---
- name: Critical Windows Services
  hosts: windows
  gather_facts: no

  tasks:

    - name: Get critical services
      ansible.windows.win_shell: |
        $Services = @(
            "DNS",
            "DHCPServer",
            "WinRM",
            "W32Time",
            "LanmanServer",
            "vmms",
            "W3SVC",
            "Schedule"
        )

        $Result = @()

        foreach ($Service in $Services)
        {
            $S = Get-Service -Name $Service -ErrorAction SilentlyContinue

            if ($S)
            {
                $Result += [PSCustomObject]@{
                    Name        = $S.Name
                    DisplayName = $S.DisplayName
                    Status      = $S.Status.ToString()
                    StartType   = $S.StartType.ToString()
                }
            }
            else
            {
                $Result += [PSCustomObject]@{
                    Name        = $Service
                    DisplayName = "Not Installed"
                    Status      = "N/A"
                    StartType   = "N/A"
                }
            }
        }

        $Result | ConvertTo-Json

      register: critical_services

    - name: Display critical services
      debug:
        var: critical_services.stdout
